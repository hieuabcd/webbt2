name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519

    - name: Deploy to VPS
      run: |
        ssh -o StrictHostKeyChecking=no root@167.71.198.148 << 'EOF'
          cd /var/www/html

          # đảm bảo đúng branch
          git checkout main

          # pull đúng branch
          git pull origin main

          # reload nginx
          systemctl reload nginx
        EOF