version: "3.9"

services:
  web:
    image: nginx:latest
    container_name: static-web
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      # - ./:/usr/share/nginx/html
      - /opt/app/html:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt
      - ./nginx.conf:/etc/nginx/conf.d/default.conf